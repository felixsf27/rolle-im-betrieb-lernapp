<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rolle im Betrieb – Lern-App</title>
<meta name="theme-color" content="#4f46e5">
<meta name="description" content="Quiz &amp; Karteikarten für das Umschulungsfach Rolle im Betrieb">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rolle im Betrieb">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="brand" id="homeBtn">📘 Rolle im Betrieb</div>
  <div class="streak" id="streakBadge">🔥 0</div>
</header>

<main id="app">

  <!-- HOME / TOPIC SELECT -->
  <section id="view-home" class="view">
    <h1>Rolle im Betrieb</h1>
    <p class="subtitle">Lern-App für dein Fach in der Umschulung. Wähle ein Thema und einen Modus.</p>

    <button id="installBtn" class="install-btn hidden">⬇️ App installieren</button>

    <div class="mode-picker">
      <button class="mode-btn active" data-mode="quiz">❓ Quiz</button>
      <button class="mode-btn" data-mode="cards">🗂️ Karteikarten</button>
      <button class="mode-btn" data-mode="test">⏱️ Testmodus (alle Themen)</button>
    </div>

    <div id="topicGrid" class="topic-grid"></div>
  </section>

  <!-- QUIZ VIEW -->
  <section id="view-quiz" class="view hidden">
    <div class="quiz-header">
      <button class="back-btn" id="backFromQuiz">← Zurück</button>
      <div class="progress-wrap"><div class="progress-bar" id="quizProgress"></div></div>
      <div class="score" id="quizScore">0 / 0</div>
    </div>
    <div class="card question-card">
      <div class="q-topic" id="qTopicLabel"></div>
      <h2 id="qText"></h2>
      <div id="qOptions" class="options"></div>
      <div id="qFeedback" class="feedback hidden"></div>
      <button id="qNextBtn" class="primary-btn hidden">Weiter →</button>
    </div>
  </section>

  <!-- RESULT VIEW -->
  <section id="view-result" class="view hidden">
    <div class="card result-card">
      <div id="resultEmoji" class="result-emoji">🎉</div>
      <h2 id="resultTitle">Geschafft!</h2>
      <p id="resultText"></p>
      <div class="result-actions">
        <button class="primary-btn" id="retryBtn">Nochmal üben</button>
        <button class="secondary-btn" id="homeFromResult">Zur Themenübersicht</button>
      </div>
    </div>
  </section>

  <!-- FLASHCARD VIEW -->
  <section id="view-cards" class="view hidden">
    <div class="quiz-header">
      <button class="back-btn" id="backFromCards">← Zurück</button>
      <div class="progress-wrap"><div class="progress-bar" id="cardProgress"></div></div>
      <div class="score" id="cardCount">0 / 0</div>
    </div>
    <div class="flip-wrap">
      <div class="flipcard" id="flipcard">
        <div class="flipcard-inner" id="flipcardInner">
          <div class="flipcard-front">
            <div class="q-topic" id="cardTopicLabel"></div>
            <div class="flip-text" id="cardFront"></div>
            <div class="tap-hint">Tippen zum Umdrehen</div>
          </div>
          <div class="flipcard-back">
            <div class="flip-text" id="cardBack"></div>
            <div class="tap-hint">Tippen zum Umdrehen</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <button class="secondary-btn" id="cardKnewBtn">✅ Wusste ich</button>
      <button class="secondary-btn" id="cardRepeatBtn">🔁 Nochmal lernen</button>
    </div>
  </section>

</main>

<footer class="footer">
  <span>Erstellt für die Umschulung · Alle Inhalte offline nutzbar</span>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
